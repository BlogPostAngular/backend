name: CI/CD to GCP Compute Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          # Build using the production stage target
          docker build \
            -t ghcr.io/blogpostangular/backend-api:latest \
            --target production \
            -f Dockerfile .
          
          # Push the image to GHCR
          docker push ghcr.io/blogpostangular/backend-api:latest

      - name: Create deployment archive
        run: |
          # Create a tar archive of the current directory, excluding unnecessary files
          tar -cvf deploy.tar \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='deploy.tar' \
            .

      - name: Copy archive to GCP Compute Engine
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "deploy.tar"
          target: "~/app-blog/server"

      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            # Navigate to the app directory (create if it doesn't exist)
            mkdir -p ~/app-blog/server
            cd ~/app-blog/server
            
            # Extract the archive and remove it
            tar -xvf deploy.tar
            rm deploy.tar
            
            # Inject production .env from GitHub Secrets (go to GitHub repo → Settings → Secrets)
            echo "${{ secrets.PROD_ENV_FILE }}" > .env
            
            # Log in to GHCR on the VM temporarily
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            # Start the deployment via docker-compose
            cd docker
            
            # Pull the latest image
            docker compose -f docker-compose.prod.yml pull
            
            # Bring down the old containers and start the new ones
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            
            # Clean up old unused docker images and builder cache to free up disk space
            docker image prune -af
            docker builder prune -f
            
            # Log out from registry
            docker logout ghcr.io


